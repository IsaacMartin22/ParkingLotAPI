steps:
  - label: ":pipeline: Run Unit Tests"
    key: "run-unit-tests"
    plugins:
      - docker#v5.12.0:
          image: "public.ecr.aws/docker/library/eclipse-temurin:17"
    command:
      - "chmod +x ./mvnw"
      - "java -version"
      - "./mvnw -B -ntp test"

  - block: ":rocket: Optional SDK Release"
    key: "optional-sdk-release"
    depends_on: "run-unit-tests"
    if: build.branch == "main"
    prompt: "Choose the semantic version bump for the SDK release tag."
    fields:
      - select: "SDK release type"
        key: "sdk_release_type"
        default: "none"
        options:
          - label: "No release"
            value: "none"
          - label: "Patch"
            value: "patch"
          - label: "Minor"
            value: "minor"
          - label: "Major"
            value: "major"

  - label: ":label: Create SDK release tag"
    key: "create-sdk-release-tag"
    depends_on: "optional-sdk-release"
    if: build.branch == "main"
    plugins:
      - docker#v5.12.0:
          image: "public.ecr.aws/docker/library/eclipse-temurin:17"
          mount-buildkite-agent: true
          environment:
            - GITHUB_TOKEN
    command:
      - "chmod +x ./mvnw"
      - "bash .buildkite/scripts/release-sdk-tag.sh"

  - label: ":package: Publish SDK to Maven Central"
    key: "publish-sdk-to-maven-central"
    depends_on: "create-sdk-release-tag"
    if: build.branch == "main"
    plugins:
      - docker#v5.12.0:
          image: "public.ecr.aws/docker/library/eclipse-temurin:17"
          mount-buildkite-agent: true
          environment:
            - MAVEN_CENTRAL_USERNAME
            - MAVEN_CENTRAL_TOKEN
            - GPG_PRIVATE_KEY
            - GPG_PASSPHRASE
    command:
      - "chmod +x ./mvnw"
      - "bash .buildkite/scripts/publish-sdk.sh"

