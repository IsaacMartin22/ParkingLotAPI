name: Publish SDK to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to publish (example: 0.1.0)"
        required: true
        type: string
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve SDK version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set SDK module version
        run: |
          mvn -B -ntp -pl sdk versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Publish sdk module
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: >
          mvn -B -ntp -pl sdk -am deploy -DskipTests
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}

